services:
  postgres:
    image: postgres:16
    container_name: pickados-postgres
    environment:
      POSTGRES_DB: pickados_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pickados_pgdata:/var/lib/postgresql/data

volumes:
  pickados_pgdata:

