version: "2"
type: backend
tech_stack:
  - Java 17
  - Spring Boot 3.5 (Spring MVC)
  - Spring Security (JWT, stateless)
  - Spring Data JPA (Hibernate)
  - Database: PostgreSQL (prod), H2 (test)
  - Maven
  - MapStruct, Lombok
  - SpringDoc OpenAPI
  - S3-compatible storage (Cloudflare R2)
features:
  - name: Authentication & Account
    description: Login, session, registration, email verification and password reset flows.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/AuthController.java
      - src/main/java/com/samuel_mc/pickados_api/config/SecurityConfig.java
    endpoints:
      - method: POST
        path: /auth/login
        description: Authenticate and set auth cookie with JWT.
        auth_required: false
      - method: GET
        path: /auth/session
        description: Return current authenticated session info.
        auth_required: true
      - method: POST
        path: /auth/logout
        description: Expire auth cookie.
        auth_required: true
      - method: POST
        path: /auth/register-tipster
        description: Register a new tipster account.
        auth_required: false
      - method: POST
        path: /auth/register-admin
        description: Register an admin (admin-only).
        auth_required: true
      - method: POST
        path: /auth/register-user
        description: Legacy alias for internal registration (admin-only).
        auth_required: true
      - method: GET
        path: /auth/availability
        description: Check username/email availability.
        auth_required: false
      - method: GET
        path: /auth/verify-email
        description: Verify email with token.
        auth_required: false
      - method: POST
        path: /auth/request-password-reset
        description: Request password reset email.
        auth_required: false
      - method: POST
        path: /auth/reset-password
        description: Reset password using token.
        auth_required: false
    depends_on:
      - Users & Roles
      - Email service

  - name: Catalog Management
    description: Public read APIs and admin CRUD for sports, countries, competitions, teams, sportsbooks and home-prashes (including logo upload presign/complete).
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/CatalogController.java
      - src/main/java/com/samuel_mc/pickados_api/config/SecurityConfig.java
    endpoints:
      - method: GET
        path: /catalogs/**
        description: Read catalogs (sports, countries, competitions, teams, sportsbooks, home-prashes).
        auth_required: false
      - method: POST
        path: /catalogs/**
        description: Create catalog items and presign/complete logo uploads (admin-only).
        auth_required: true
      - method: PUT
        path: /catalogs/**
        description: Update catalog items (admin-only).
        auth_required: true
      - method: DELETE
        path: /catalogs/**
        description: Delete catalog items (admin-only).
        auth_required: true
    depends_on:
      - S3-compatible storage (R2) for logos (when enabled)

  - name: Sportsbooks (Public)
    description: Public read-only list of sportsbooks used by posts.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/post/SportsbookController.java
      - src/main/java/com/samuel_mc/pickados_api/config/SecurityConfig.java
    endpoints:
      - method: GET
        path: /sportsbooks
        description: List sportsbooks.
        auth_required: false

  - name: Posts & Social Interactions
    description: Create posts (tipsters), read feeds/details (authenticated), public post detail, comments, reactions, saved posts, views, share/repost, and follow/unfollow.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/post/PostsController.java
      - src/main/java/com/samuel_mc/pickados_api/config/SecurityConfig.java
    endpoints:
      - method: GET
        path: /posts/public/{postId}
        description: Get public post detail by id.
        auth_required: false
      - method: GET
        path: /posts/**
        description: Fetch feeds, details, comments, saved, user posts (authenticated).
        auth_required: true
      - method: POST
        path: /posts/media/**
        description: Presign/complete post media uploads (tipster-only).
        auth_required: true
      - method: POST
        path: /posts
        description: Create a post (tipster-only).
        auth_required: true
      - method: PUT
        path: /posts/*/pick-status
        description: Update pick result/status (tipster-only).
        auth_required: true
    depends_on:
      - Users & Profiles
      - S3-compatible storage (R2) for media (when enabled)

  - name: Notifications
    description: User notifications inbox and read tracking.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/NotificationController.java
    endpoints:
      - method: GET
        path: /notifications
        description: List notifications for current user.
        auth_required: true
      - method: PUT
        path: /notifications/{notificationId}/read
        description: Mark a notification as read.
        auth_required: true

  - name: Me Profile
    description: Manage authenticated user's profile and avatar upload.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/MeProfileController.java
    endpoints:
      - method: GET
        path: /me/profile
        description: Get my profile.
        auth_required: true
      - method: PUT
        path: /me/profile
        description: Update my profile.
        auth_required: true
      - method: POST
        path: /me/profile/avatar/presign
        description: Presign avatar upload.
        auth_required: true
      - method: POST
        path: /me/profile/avatar/complete
        description: Complete avatar upload.
        auth_required: true

  - name: Admin User Management
    description: Admin-only user listing and moderation actions.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/UsersController.java
      - src/main/java/com/samuel_mc/pickados_api/config/SecurityConfig.java
    endpoints:
      - method: GET
        path: /users
        description: List users (admin-only; optional role filter).
        auth_required: true
      - method: GET
        path: /users/admins
        description: List admins.
        auth_required: true
      - method: PUT
        path: /users/{id}
        description: Update user fields.
        auth_required: true
      - method: PUT
        path: /users/{id}/tipster-validation
        description: Toggle tipster validation status.
        auth_required: true
      - method: PUT
        path: /users/{id}/inactivate
        description: Toggle active flag.
        auth_required: true
      - method: DELETE
        path: /users/{id}
        description: Soft-delete user.
        auth_required: true

  - name: Roles (Admin)
    description: Admin-only list of roles.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/RolesController.java
      - src/main/java/com/samuel_mc/pickados_api/config/SecurityConfig.java
    endpoints:
      - method: GET
        path: /roles
        description: List roles.
        auth_required: true

  - name: Admin Analytics
    description: Admin-only overview metrics.
    files:
      - src/main/java/com/samuel_mc/pickados_api/controllers/analytics/AdminAnalyticsController.java
      - src/main/java/com/samuel_mc/pickados_api/config/SecurityConfig.java
    endpoints:
      - method: GET
        path: /analytics/admin/overview
        description: Admin overview analytics.
        auth_required: true
known_limitations:
  - issue: Test profile properties were only present under src/test/resources, which are not used by spring-boot:run.
    location: src/test/resources/application-test.properties
    impact: Local server startup for testing can fail without duplicating the test profile into main resources.
  - issue: Production properties include sensitive credentials (database, mail, storage).
    location: src/main/resources/application-prod.properties
    impact: Secrets may be committed/leaked; should be moved to environment variables or a secrets manager.
