spring.application.name=pickados-api

#spring.webservices.path=/pickados-api/v1

spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Render expone el puerto en la variable PORT
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update

# JWT
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=3600000

# App
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.auth.cookie-name=${APP_AUTH_COOKIE_NAME:picka2_auth}
app.auth.cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}
