server.port=8080

# ===============================
# = DATASOURCE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/pickados_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# = MAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=smdoomed@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Cloudflare R2 (S3-compatible). Activar cuando tengas bucket y credenciales.
r2.enabled=${R2_ENABLED:false}
r2.endpoint=${R2_ENDPOINT:}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket=${R2_BUCKET:}
r2.region=${R2_REGION:auto}
# URL publica para leer objetos (custom domain o r2.dev), sin barra final
r2.public-base-url=${R2_PUBLIC_BASE_URL:}
